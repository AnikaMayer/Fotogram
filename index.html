<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Fotogram</title>

        <link
            rel="icon"
            href="./assets/icons/fotogram_icon.svg"
            type="image/x-icon"
        />

        <link rel="stylesheet" href="./style/standard.css" />
        <link rel="stylesheet" href="./style/style.css" />
        <link rel="stylesheet" href="./style/fonts.css" />
        <link rel="stylesheet" href="./style/responsive.css" />
        <script src="db.js"></script>
        <script src="script.js" defer></script>
    </head>
    <body onload="renderGallery()">
        <header>
            <nav>
                <img
                    src="./assets/icons/logo_fotogram.svg"
                    alt="fotogram_logo"
                />
            </nav>
        </header>
        <main>
            <section class="photo_album">
                <h1>Your personal photo album</h1>
                <article id="photo_container" class="photo_wrapper"></article>
                <dialog
                    id="photo_dialog"
                    class="dialog_wrapper"
                    onclick="closeDialog()"
                ></dialog>
            </section>
        </main>
        <footer>
            <img
                src="./assets/icons/da_logo.svg"
                alt="developer_akademie_logo"
            />
            <p>© 2023 Developer Akademie GmbH</p>
        </footer>
    </body>
</html>
